<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMQ – Suivi des actions</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p50:#EEEDFE;--p200:#AFA9EC;--p600:#534AB7;--p800:#3C3489;
  --t50:#E1F5EE;--t200:#5DCAA5;--t600:#0F6E56;--t800:#085041;
  --a50:#FAEEDA;--a200:#FAC775;--a600:#854F0B;--a800:#633806;
  --c50:#FAECE7;--c200:#F0997B;--c600:#993C1D;--c800:#712B13;
  --b50:#E6F1FB;--b200:#85B7EB;--b600:#185FA5;--b800:#0C447C;
  --g50:#F1EFE8;--g200:#B4B2A9;--g600:#5F5E5A;
  --r:#10px;--rsm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:#f4f3f0;color:#1a1a1a;min-height:100vh;font-size:13px}

/* HEADER */
.hdr{background:#fff;border-bottom:.5px solid #ddd;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:7px;background:var(--p600);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700}
.hdr h1{font-size:14px;font-weight:600}
.hdr-sub{font-size:11px;color:#999}
.hdr-right{display:flex;align-items:center;gap:8px}

/* TABS */
.tabs{display:flex;gap:0;padding:0 20px;background:#fff;border-bottom:.5px solid #e0e0e0}
.tab{padding:9px 16px;font-size:12px;color:#888;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--font);transition:all .15s;white-space:nowrap}
.tab.active{color:var(--p600);border-bottom-color:var(--p600);font-weight:500}
.tab-panel{display:none;padding:16px 20px}
.tab-panel.active{display:block}

/* FILTRES */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.04em}
select,input[type=text],input[type=date]{padding:7px 10px;border:.5px solid #ddd;border-radius:var(--rsm);font-size:12px;color:#333;background:#fff;font-family:var(--font);min-width:120px}
select:focus,input:focus{outline:none;border-color:var(--p600);box-shadow:0 0 0 2px var(--p50)}
.btn{padding:7px 14px;border-radius:var(--rsm);font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--p600);color:#fff}.btn-primary:hover{background:var(--p800)}
.btn-ghost{background:none;border:.5px solid #ddd;color:#666}.btn-ghost:hover{background:#f8f8f8}
.btn-danger{background:none;border:.5px solid var(--c200);color:var(--c600)}.btn-danger:hover{background:var(--c50)}
.btn-sm{padding:5px 10px;font-size:11px}

/* STATS BAR */
.stats-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:.5px solid;transition:all .15s}
.stat-chip:hover{opacity:.85}
.sc-all{background:#f4f3f0;border-color:#ddd;color:#555}
.sc-all.active{background:#333;border-color:#333;color:#fff}
.sc-realise{background:var(--t50);border-color:var(--t200);color:var(--t800)}
.sc-realise.active{background:var(--t600);border-color:var(--t600);color:#fff}
.sc-encours{background:var(--b50);border-color:var(--b200);color:var(--b800)}
.sc-encours.active{background:var(--b600);border-color:var(--b600);color:#fff}
.sc-atraiter{background:var(--p50);border-color:var(--p200);color:var(--p800)}
.sc-atraiter.active{background:var(--p600);border-color:var(--p600);color:#fff}
.sc-attente{background:var(--a50);border-color:var(--a200);color:var(--a800)}
.sc-attente.active{background:var(--a600);border-color:var(--a600);color:#fff}
.sc-probleme{background:var(--c50);border-color:var(--c200);color:var(--c800)}
.sc-probleme.active{background:var(--c600);border-color:var(--c600);color:#fff}

/* KANBAN */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.k-col{flex:0 0 240px;background:#f4f3f0;border-radius:10px;overflow:hidden}
.k-col-hd{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid rgba(0,0,0,.06)}
.k-col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.k-col-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
.k-cards{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:60px}
.k-card{background:#fff;border-radius:8px;padding:10px 11px;border:.5px solid #e8e8e8;cursor:pointer;transition:all .15s;position:relative}
.k-card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.k-card-title{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:5px;line-height:1.4}
.k-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.k-card-wp{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.k-card-qui{font-size:10px;color:#888;display:flex;align-items:center;gap:3px}
.k-card-deadline{font-size:10px;margin-left:auto;padding:2px 6px;border-radius:4px}
.dl-ok{background:var(--t50);color:var(--t800)}
.dl-soon{background:var(--a50);color:var(--a800)}
.dl-late{background:var(--c50);color:var(--c800)}
.k-card-comment{font-size:10px;color:#aaa;margin-top:5px;font-style:italic;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Couleurs colonnes kanban */
.k-realise .k-col-hd{background:var(--t50)}.k-realise .k-col-title{color:var(--t800)}.k-realise .k-col-count{background:var(--t200);color:var(--t800)}
.k-encours .k-col-hd{background:var(--b50)}.k-encours .k-col-title{color:var(--b800)}.k-encours .k-col-count{background:var(--b200);color:var(--b800)}
.k-atraiter .k-col-hd{background:var(--p50)}.k-atraiter .k-col-title{color:var(--p800)}.k-atraiter .k-col-count{background:var(--p200);color:var(--p800)}
.k-attente .k-col-hd{background:var(--a50)}.k-attente .k-col-title{color:var(--a800)}.k-attente .k-col-count{background:var(--a200);color:var(--a800)}
.k-probleme .k-col-hd{background:var(--c50)}.k-probleme .k-col-title{color:var(--c800)}.k-probleme .k-col-count{background:var(--c200);color:var(--c800)}

/* LISTE */
.list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:.5px solid #e0e0e0}
.list-table th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;background:#fafafa;border-bottom:.5px solid #f0f0f0}
.list-table td{padding:9px 12px;border-bottom:.5px solid #f5f5f5;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr:hover td{background:#fafafa}
.td-tache{font-weight:500;color:#1a1a1a;max-width:280px}
.td-tache-sub{font-size:10px;color:#aaa;margin-top:2px}
.statut-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
.s-realise{background:var(--t50);color:var(--t800)}
.s-encours{background:var(--b50);color:var(--b800)}
.s-atraiter{background:var(--p50);color:var(--p800)}
.s-attente{background:var(--a50);color:var(--a800)}
.s-probleme{background:var(--c50);color:var(--c800)}
.prio-haute{background:var(--c50);color:var(--c800);padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500}
.prio-normale{color:#bbb;font-size:10px}

/* VUE HEBDO */
.hebdo-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.hebdo-section{background:#fff;border-radius:10px;border:.5px solid #e0e0e0;overflow:hidden}
.hebdo-hd{padding:11px 14px;border-bottom:.5px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.hebdo-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.hebdo-title{font-size:12px;font-weight:600;color:#333}
.hebdo-count{margin-left:auto;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
.hebdo-item{padding:9px 14px;border-bottom:.5px solid #f5f5f5;display:flex;align-items:flex-start;gap:9px}
.hebdo-item:last-child{border-bottom:none}
.hebdo-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hebdo-item-text{flex:1}
.hebdo-item-name{font-size:12px;font-weight:500;color:#222}
.hebdo-item-meta{font-size:10px;color:#999;margin-top:2px}
.hebdo-item-dl{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:auto;flex-shrink:0}
.hebdo-empty{padding:20px;text-align:center;font-size:12px;color:#bbb}

/* VUE DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dash-card{background:#fff;border-radius:10px;border:.5px solid #e0e0e0;overflow:hidden}
.dash-card-hd{padding:11px 14px;border-bottom:.5px solid #f0f0f0}
.dash-card-title{font-size:12px;font-weight:600;color:#333}
.wp-row{padding:10px 14px;border-bottom:.5px solid #f5f5f5}
.wp-row:last-child{border-bottom:none}
.wp-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.wp-name{font-size:12px;font-weight:500;color:#222}
.wp-pct{font-size:11px;color:#999}
.progress-bg{background:#f0f0f0;border-radius:3px;height:5px}
.progress-fill{height:5px;border-radius:3px;transition:width .6s ease}
.membre-row{padding:8px 14px;border-bottom:.5px solid #f5f5f5;display:flex;align-items:center;gap:10px}
.membre-row:last-child{border-bottom:none}
.av-sm{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.membre-info{flex:1}
.membre-name{font-size:12px;font-weight:500;color:#222}
.membre-stats{font-size:10px;color:#999}
.membre-chips{display:flex;gap:4px;margin-left:auto}
.m-chip{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:500}

/* MODALE */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600}
.btn-x{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0 4px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:.5px solid #f0f0f0}
textarea{width:100%;padding:8px 10px;border:.5px solid #ddd;border-radius:var(--rsm);font-size:12px;resize:vertical;min-height:60px;font-family:var(--font)}
.req{color:var(--c600);margin-left:2px}

/* ALERTES */
.alert-banner{background:var(--c50);border:.5px solid var(--c200);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--c800);display:flex;align-items:center;gap:8px}
.alert-banner strong{font-weight:600}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:0;border:.5px solid #ddd;border-radius:6px;overflow:hidden}
.vt-btn{padding:6px 12px;font-size:11px;background:#fff;border:none;cursor:pointer;color:#888;font-family:var(--font);font-weight:500;transition:all .15s}
.vt-btn.active{background:var(--p600);color:#fff}

@media(max-width:800px){.kanban{flex-direction:column}.k-col{flex:none;width:100%}.hebdo-grid,.dash-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">C</div>
    <div>
      <h1>CMQ — Suivi des actions FIBI</h1>
      <div class="hdr-sub" id="hdrSub">Chargement…</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Nouvelle tâche</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('kanban')">Kanban</button>
  <button class="tab" onclick="switchTab('liste')">Liste</button>
  <button class="tab" onclick="switchTab('hebdo')">Réunion hebdo</button>
  <button class="tab" onclick="switchTab('dashboard')">Dashboard</button>
</div>

<!-- FILTRES GLOBAUX -->
<div style="padding:12px 20px 0;background:#fff;border-bottom:.5px solid #f0f0f0">
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">WP</span>
      <select id="fWP" onchange="applyFilters()"><option value="">Tous les WPs</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Responsable</span>
      <select id="fQui" onchange="applyFilters()"><option value="">Tous</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Recherche</span>
      <input type="text" id="fSearch" placeholder="Tâche, commentaire…" oninput="applyFilters()">
    </div>
    <div class="filter-group" style="margin-left:auto">
      <span class="filter-label">Priorité</span>
      <select id="fPrio" onchange="applyFilters()">
        <option value="">Toutes</option>
        <option value="Haute">Haute</option>
        <option value="Normale">Normale</option>
      </select>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="resetFilters()" style="align-self:flex-end">Réinitialiser</button>
  </div>

  <!-- Stats / filtres rapides statut -->
  <div class="stats-bar" id="statsBar"></div>
</div>

<!-- TAB KANBAN -->
<div class="tab-panel active" id="tab-kanban">
  <div class="kanban" id="kanbanBoard"></div>
</div>

<!-- TAB LISTE -->
<div class="tab-panel" id="tab-liste">
  <table class="list-table">
    <thead>
      <tr>
        <th>Tâche</th>
        <th>Responsable</th>
        <th>WP</th>
        <th>Statut</th>
        <th>Deadline</th>
        <th>Priorité</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="listBody"></tbody>
  </table>
</div>

<!-- TAB HEBDO -->
<div class="tab-panel" id="tab-hebdo">
  <div id="hebdoContent"></div>
</div>

<!-- TAB DASHBOARD -->
<div class="tab-panel" id="tab-dashboard">
  <div id="dashContent"></div>
</div>

<!-- MODAL TÂCHE -->
<div class="overlay" id="taskOverlay">
<div class="modal">
  <div class="modal-hd">
    <span class="modal-title" id="modalTitle">Nouvelle tâche</span>
    <button class="btn-x" onclick="closeModal()">×</button>
  </div>
  <div class="fg"><label class="fl">Tâche <span class="req">*</span></label>
    <input type="text" id="mTache" style="width:100%" placeholder="Description de la tâche…"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="fg"><label class="fl">Responsable <span class="req">*</span></label>
      <select id="mQui" style="width:100%"></select></div>
    <div class="fg"><label class="fl">Statut</label>
      <select id="mStatut" style="width:100%">
        <option>A traiter</option><option>En cours</option>
        <option>En attente</option><option>Réalisé</option>
        <option>Problématique à résoudre</option>
      </select></div>
    <div class="fg"><label class="fl">WP</label>
      <select id="mWP" style="width:100%"></select></div>
    <div class="fg"><label class="fl">Priorité</label>
      <select id="mPrio" style="width:100%">
        <option value="Normale">Normale</option>
        <option value="Haute">Haute</option>
      </select></div>
    <div class="fg"><label class="fl">Deadline</label>
      <input type="date" id="mDeadline" style="width:100%"></div>
    <div class="fg"><label class="fl">Date réalisation</label>
      <input type="date" id="mDateReal" style="width:100%"></div>
  </div>
  <div class="fg"><label class="fl">Projet / Contexte</label>
    <input type="text" id="mProjet" style="width:100%" placeholder="Ex: Coloration formations"></div>
  <div class="fg"><label class="fl">Commentaire</label>
    <textarea id="mComment"></textarea></div>
  <div class="modal-ft">
    <button class="btn btn-danger btn-sm" id="btnDelete" onclick="deleteTask()" style="display:none">Supprimer</button>
    <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
    <button class="btn btn-primary" id="btnSave" onclick="saveTask()">Enregistrer</button>
  </div>
</div>
</div>

<script>
/* ============================================================
   ÉTAT GLOBAL
   ============================================================ */
let TACHES = [];
let MEMBRES = [];
let WPS = [];
let filteredTaches = [];
let activeStatut = '';
let editingId = null;

const STATUT_CONFIG = {
  'Réalisé':                {cls:'k-realise',  badge:'s-realise',  dot:'#0F6E56', label:'Réalisé'},
  'En cours':               {cls:'k-encours',  badge:'s-encours',  dot:'#185FA5', label:'En cours'},
  'A traiter':              {cls:'k-atraiter', badge:'s-atraiter', dot:'#534AB7', label:'À traiter'},
  'En attente':             {cls:'k-attente',  badge:'s-attente',  dot:'#854F0B', label:'En attente'},
  'Problématique à résoudre':{cls:'k-probleme',badge:'s-probleme', dot:'#993C1D', label:'Problème'},
};
const STATUT_ORDER = ['A traiter','En cours','En attente','Problématique à résoudre','Réalisé'];

/* ============================================================
   UTILITAIRES
   ============================================================ */
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts*1000).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}
function fmtDateFull(ts) {
  if (!ts) return '';
  return new Date(ts*1000).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}
function toTs(dateStr) {
  if (!dateStr) return null;
  return Math.floor(new Date(dateStr).getTime()/1000);
}
function fromTs(ts) {
  if (!ts) return '';
  return new Date(ts*1000).toISOString().split('T')[0];
}
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/[\s&]+/);
  return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.substring(0,2).toUpperCase();
}
function deadlineClass(ts) {
  if (!ts) return '';
  const now = Date.now()/1000;
  const diff = (ts - now) / 86400;
  if (diff < 0) return 'dl-late';
  if (diff <= 7) return 'dl-soon';
  return 'dl-ok';
}
function deadlineLabel(ts) {
  if (!ts) return '';
  const now = Date.now()/1000;
  const diff = Math.ceil((ts - now) / 86400);
  if (diff < 0) return `${Math.abs(diff)}j retard`;
  if (diff === 0) return "Aujourd'hui";
  if (diff <= 7) return `${diff}j`;
  return fmtDate(ts);
}
function wpColor(code) {
  const colors = {'WP1':'#534AB7','WP2':'#0F6E56','WP3':'#854F0B','WP4':'#993C1D','WP5':'#185FA5'};
  return colors[code] || '#888';
}
function wpBg(code) {
  const colors = {'WP1':'#EEEDFE','WP2':'#E1F5EE','WP3':'#FAEEDA','WP4':'#FAECE7','WP5':'#E6F1FB'};
  return colors[code] || '#f4f3f0';
}
function memberColor(nom, i) {
  const cols = ['#534AB7','#0F6E56','#854F0B','#993C1D','#185FA5','#3C3489','#085041'];
  const idx = MEMBRES.findIndex(m=>m.nom===nom);
  return cols[(idx>=0?idx:i) % cols.length];
}
function avBg(nom) {
  const bgs = ['#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7','#E6F1FB','#f4f3f0'];
  const idx = MEMBRES.findIndex(m=>m.nom===nom);
  return bgs[(idx>=0?idx:0) % bgs.length];
}

/* ============================================================
   TABS
   ============================================================ */
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>
    el.classList.toggle('active',['kanban','liste','hebdo','dashboard'][i]===t));
  document.querySelectorAll('.tab-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
}

/* ============================================================
   FILTRES
   ============================================================ */
function applyFilters() {
  const wp  = document.getElementById('fWP')?.value || '';
  const qui = document.getElementById('fQui')?.value || '';
  const q   = (document.getElementById('fSearch')?.value || '').toLowerCase();
  const prio= document.getElementById('fPrio')?.value || '';

  filteredTaches = TACHES.filter(t => {
    if (wp && t.wp_code !== wp) return false;
    if (qui && !t.qui.includes(qui)) return false;
    if (prio && t.priorite !== prio) return false;
    if (activeStatut && t.statut !== activeStatut) return false;
    if (q && !t.tache.toLowerCase().includes(q) && !t.commentaire.toLowerCase().includes(q)) return false;
    return true;
  });
  render();
}
function resetFilters() {
  document.getElementById('fWP').value='';
  document.getElementById('fQui').value='';
  document.getElementById('fSearch').value='';
  document.getElementById('fPrio').value='';
  activeStatut='';
  applyFilters();
}
function filterByStatut(s) {
  activeStatut = activeStatut===s ? '' : s;
  applyFilters();
}

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render() {
  renderStats();
  const active = document.querySelector('.tab-panel.active')?.id;
  if (active==='tab-kanban') renderKanban();
  else if (active==='tab-liste') renderListe();
  else if (active==='tab-hebdo') renderHebdo();
  else if (active==='tab-dashboard') renderDash();
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const all = filteredTaches.length;
  const byS = {};
  TACHES.forEach(t=>{ byS[t.statut]=(byS[t.statut]||0)+1; });

  bar.innerHTML = `<div class="stat-chip sc-all ${!activeStatut?'active':''}" onclick="filterByStatut('')">
    Toutes <strong>${all}</strong></div>` +
    Object.entries(STATUT_CONFIG).map(([s,cfg])=>{
      const n = byS[s]||0;
      if (!n) return '';
      const cls = cfg.cls.replace('k-','sc-');
      return `<div class="stat-chip ${cls} ${activeStatut===s?'active':''}" onclick="filterByStatut('${s}')">
        ${cfg.label} <strong>${n}</strong></div>`;
    }).join('');

  // Alerte deadlines dépassées
  const late = filteredTaches.filter(t=>t.deadline && t.deadline<Date.now()/1000 && t.statut!=='Réalisé');
  const alertZone = document.querySelector('#tab-kanban .alert-banner');
  if (late.length && !alertZone) {
    const k = document.getElementById('kanbanBoard');
    const banner = document.createElement('div');
    banner.className='alert-banner';
    banner.innerHTML=`<strong>${late.length} tâche${late.length>1?'s':''} en retard</strong> — deadline dépassée`;
    k.parentNode.insertBefore(banner, k);
  }
}

/* ── KANBAN ── */

/* ── HEBDO ── */
function renderHebdo() {
  const now = Date.now()/1000;
  const week7 = now + 7*86400;
  const all = TACHES;

  const late     = all.filter(t=>t.deadline && t.deadline<now && t.statut!=='Réalisé')
                       .sort((a,b)=>a.deadline-b.deadline);
  const thiswk   = all.filter(t=>t.deadline && t.deadline>=now && t.deadline<=week7 && t.statut!=='Réalisé')
                       .sort((a,b)=>a.deadline-b.deadline);
  const problemes= all.filter(t=>t.statut==='Problématique à résoudre');
  const done     = [...all].filter(t=>t.statut==='Réalisé')
                       .sort((a,b)=>(b.date_realisation||0)-(a.date_realisation||0)).slice(0,8);
  const encours  = all.filter(t=>t.statut==='En cours').sort((a,b)=>(a.deadline||9e9)-(b.deadline||9e9));

  function section(title, icon, iconBg, countBg, countColor, items, renderer) {
    return `<div class="hebdo-section">
      <div class="hebdo-hd">
        <div class="hebdo-icon" style="background:${iconBg}">${icon}</div>
        <span class="hebdo-title">${title}</span>
        <span class="hebdo-count" style="background:${countBg};color:${countColor}">${items.length}</span>
      </div>
      ${items.length ? items.map(renderer).join('') : '<div class="hebdo-empty">Aucune tâche</div>'}
    </div>`;
  }

  function itemHtml(t, dotColor) {
    return `<div class="hebdo-item">
      <div class="hebdo-item-dot" style="background:${dotColor}"></div>
      <div class="hebdo-item-text">
        <div class="hebdo-item-name">${t.tache}</div>
        <div class="hebdo-item-meta">${t.qui} · <span style="font-size:10px;padding:1px 5px;border-radius:3px;background:${wpBg(t.wp_code)};color:${wpColor(t.wp_code)}">${t.wp_code}</span></div>
      </div>
      ${t.deadline?`<span class="hebdo-item-dl ${deadlineClass(t.deadline)}">${fmtDate(t.deadline)}</span>`:''}
    </div>`;
  }

  // Semaine en cours label
  const monday = new Date(); monday.setDate(monday.getDate()-monday.getDay()+1);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const wkLabel = `Semaine du ${monday.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})} au ${sunday.toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})}`;

  document.getElementById('hebdoContent').innerHTML = `
    <div style="margin-bottom:14px;padding:10px 14px;background:#fff;border-radius:8px;border:.5px solid #e0e0e0;font-size:12px;color:#666">
      <strong style="color:#333">Réunion hebdo</strong> — ${wkLabel}
      · <strong style="color:#333">${all.filter(t=>t.statut!=='Réalisé').length}</strong> tâches actives
      · <strong style="color:var(--c600)">${late.length}</strong> en retard
    </div>
    <div class="hebdo-grid">
      ${section('En retard','⚠','#FAECE7','#F0997B','#712B13',late,t=>itemHtml(t,'#993C1D'))}
      ${section('Cette semaine','📅','#E6F1FB','#85B7EB','#0C447C',thiswk,t=>itemHtml(t,'#185FA5'))}
      ${section('En cours','⚡','#E1F5EE','#5DCAA5','#085041',encours,t=>itemHtml(t,'#0F6E56'))}
      ${section('Problèmes','🚨','#FAECE7','#F0997B','#712B13',problemes,t=>itemHtml(t,'#993C1D'))}
    </div>
    <div style="margin-top:14px">
      ${section('Récemment réalisé ✓','✅','#E1F5EE','#5DCAA5','#085041',done,t=>itemHtml(t,'#0F6E56'))}
    </div>`;
}

/* ── DASHBOARD ── */
function renderDash() {
  const all = TACHES;

  // Par WP
  const wpRows = WPS.map(wp => {
    const tasks = all.filter(t=>t.wp_code===wp.code);
    const done  = tasks.filter(t=>t.statut==='Réalisé').length;
    const pct   = tasks.length ? Math.round(done/tasks.length*100) : 0;
    return `<div class="wp-row">
      <div class="wp-row-top">
        <span class="wp-name"><span style="font-size:10px;padding:2px 6px;border-radius:4px;background:${wpBg(wp.code)};color:${wpColor(wp.code)};font-weight:600;margin-right:6px">${wp.code}</span>${wp.label.split(' - ').slice(1).join(' ')}</span>
        <span class="wp-pct">${done}/${tasks.length} — ${pct}%</span>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${wpColor(wp.code)}"></div></div>
    </div>`;
  }).join('');

  // Par membre
  const memRows = MEMBRES.map((m,i) => {
    const tasks = all.filter(t=>t.qui.includes(m.nom));
    const done  = tasks.filter(t=>t.statut==='Réalisé').length;
    const enc   = tasks.filter(t=>t.statut==='En cours').length;
    const atr   = tasks.filter(t=>t.statut==='A traiter').length;
    const pb    = tasks.filter(t=>t.statut==='Problématique à résoudre').length;
    if (!tasks.length) return '';
    return `<div class="membre-row">
      <div class="av-sm" style="background:${avBg(m.nom)};color:${memberColor(m.nom,i)}">${initials(m.nom)}</div>
      <div class="membre-info">
        <div class="membre-name">${m.nom}</div>
        <div class="membre-stats">${tasks.length} tâches · ${done} réalisées</div>
      </div>
      <div class="membre-chips">
        ${enc?`<span class="m-chip" style="background:var(--b50);color:var(--b800)">${enc} en cours</span>`:''}
        ${atr?`<span class="m-chip" style="background:var(--p50);color:var(--p800)">${atr} à traiter</span>`:''}
        ${pb?`<span class="m-chip" style="background:var(--c50);color:var(--c800)">${pb} pb</span>`:''}
      </div>
    </div>`;
  }).join('');

  // KPIs
  const total = all.length;
  const done  = all.filter(t=>t.statut==='Réalisé').length;
  const enc   = all.filter(t=>t.statut==='En cours').length;
  const late  = all.filter(t=>t.deadline && t.deadline<Date.now()/1000 && t.statut!=='Réalisé').length;
  const pctGlobal = Math.round(done/total*100);

  document.getElementById('dashContent').innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      ${[
        ['Tâches totales',total,'var(--p600)'],
        ['Réalisées',`${done} (${pctGlobal}%)`, 'var(--t600)'],
        ['En cours',enc,'var(--b600)'],
        ['En retard',late,'var(--c600)'],
      ].map(([l,v,col])=>`<div style="flex:1;min-width:120px;background:#fff;border-radius:10px;border:.5px solid #e0e0e0;padding:12px 16px">
        <div style="font-size:22px;font-weight:600;color:${col};line-height:1">${v}</div>
        <div style="font-size:10px;color:#999;margin-top:4px;text-transform:uppercase;letter-spacing:.04em">${l}</div>
      </div>`).join('')}
    </div>
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-hd"><span class="dash-card-title">Avancement par WP</span></div>
        ${wpRows}
      </div>
      <div class="dash-card">
        <div class="dash-card-hd"><span class="dash-card-title">Charge par membre</span></div>
        ${memRows}
      </div>
    </div>`;
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nouvelle tâche';
  document.getElementById('mTache').value='';
  document.getElementById('mQui').value='';
  document.getElementById('mStatut').value='A traiter';
  document.getElementById('mWP').value='';

  document.getElementById('mDateReal').value='';

  document.getElementById('mComment').value='';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('taskOverlay').classList.add('open');
}

function openEditModal(id) {
  const t = TACHES.find(x=>x.id===id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Modifier la tâche';
  document.getElementById('mTache').value = t.tache;
  document.getElementById('mQui').value = t.qui;
  document.getElementById('mStatut').value = t.statut;
  document.getElementById('mWP').value = t.wp_code;
  document.getElementById('mPrio').value = t.priorite||'Normale';
  document.getElementById('mDeadline').value = fromTs(t.deadline);
  document.getElementById('mDateReal').value = fromTs(t.date_realisation);
  document.getElementById('mProjet').value = t.projet_label||'';
  document.getElementById('mComment').value = t.commentaire||'';
  document.getElementById('btnDelete').style.display='inline-flex';
  document.getElementById('taskOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('taskOverlay').classList.remove('open');
  editingId = null;
}

async function saveTask() {
  const tache = document.getElementById('mTache').value.trim();
  const qui   = document.getElementById('mQui').value;
  if (!tache || !qui) { alert('Nom de la tâche et responsable obligatoires.'); return; }

  const record = {
    tache,
    qui,
    statut:           document.getElementById('mStatut').value,
    wp_code:          document.getElementById('mWP').value,
    priorite:         document.getElementById('mPrio').value,
    deadline:         toTs(document.getElementById('mDeadline').value),
    date_realisation: toTs(document.getElementById('mDateReal').value),
    projet_label:     document.getElementById('mProjet').value,
    commentaire:      document.getElementById('mComment').value,
    wp_label:         WPS.find(w=>w.code===document.getElementById('mWP').value)?.label||'',
    Cree_par:         'widget',
    date_creation:    Math.floor(Date.now()/1000),
  };

  try {
    if (editingId) {
      await grist.docApi.applyUserActions([['UpdateRecord','SUIVI_TACHES',editingId,record]]);
      const idx = TACHES.findIndex(t=>t.id===editingId);
      if (idx>=0) TACHES[idx]={...TACHES[idx],...record};
    } else {
      const res = await grist.docApi.applyUserActions([['AddRecord','SUIVI_TACHES',null,record]]);
      const newId = res?.retValues?.[0] ?? res?.[0] ?? TACHES.length+1;
      TACHES.push({id:newId,...record});
    }
    closeModal();
    applyFilters();
  } catch(e) {
    console.error(e);
    alert('Erreur enregistrement: '+e.message);
  }
}

async function deleteTask() {
  if (!editingId) return;
  if (!confirm('Supprimer cette tâche ?')) return;
  try {
    await grist.docApi.applyUserActions([['RemoveRecord','SUIVI_TACHES',editingId]]);
    TACHES = TACHES.filter(t=>t.id!==editingId);
    closeModal();
    applyFilters();
  } catch(e) {
    console.error(e);
    // En démo, on supprime juste localement
    TACHES = TACHES.filter(t=>t.id!==editingId);
    closeModal();
    applyFilters();
  }
}

function tableToRows(t) {
  if (!t) return [];
  const keys=Object.keys(t), len=t[keys[0]]?.length||0;
  return Array.from({length:len},(_,i)=>{const r={};keys.forEach(k=>r[k]=t[k][i]);return r;});
}

function populateFilterSelects() {
  const wpSel = document.getElementById('fWP');
  WPS.forEach(w=>{ const o=document.createElement('option'); o.value=w.code; o.textContent=w.code+' - '+w.label.split(' - ').slice(1).join(' '); wpSel.appendChild(o); });

  const quiSel = document.getElementById('fQui');
  MEMBRES.forEach(m=>{ const o=document.createElement('option'); o.value=m.nom; o.textContent=m.nom; quiSel.appendChild(o); });

  // Modal selects
  const mQui = document.getElementById('mQui');
  mQui.innerHTML='<option value="">— Choisir —</option>';
  MEMBRES.forEach(m=>{ const o=document.createElement('option'); o.value=m.nom; o.textContent=m.nom; mQui.appendChild(o); });

  const mWP = document.getElementById('mWP');
  mWP.innerHTML='<option value="">— Choisir —</option>';
  WPS.forEach(w=>{ const o=document.createElement('option'); o.value=w.code; o.textContent=w.code; mWP.appendChild(o); });

async function loadAll() {
